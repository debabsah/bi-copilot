name: CI

# Free, deterministic checks on every push/PR. No API key, no tokens, no third-party
# deps (validate.py and the stats kits are pure stdlib). The token-spending sweeps
# (triggering + behavioral evals) are deliberately NOT wired here -- see the decision log
# in the eval benchmark doc.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: structure + stats kit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Structural validation (files, frontmatter, no '*' tools, body <=200 lines)
        run: python3 scripts/validate.py
      - name: Experiment-kit unit tests (chi2 / SRM / two-prop-z / Holm-BH / power / peeking)
        run: python3 tests/test_experiment_checks.py
      - name: Forecast-kit unit tests (interval coverage / skill-vs-naive / error trend)
        run: python3 tests/test_forecast_checks.py
